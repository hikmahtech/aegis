# v3 agent seeds. Loader upserts by id.
# Each personality's SOUL/AGENTS/MEMORY/USER markdown lives at
# personalities/<id>/{SOUL,AGENTS,MEMORY,USER}.md — system_prompt_path
# points at the directory; chat service composes from the four files.

agents:
  - id: sebas
    name: Sebas Tian
    role: Executive assistant
    system_prompt_path: personalities/sebas
    capabilities: [email, calendar, github_alerts, daily_brief]
    model_tier: smart
    interaction_timeout_default: archive
    slack_channel_id: ""
    elevenlabs_voice_id: ""
    metadata:
      intent_keywords: [task, todo, inbox, remind, defer, project, "next action", calendar, email, waiting, schedule, "follow up"]
      knowledge_domains: [task, decision, briefing, digest, calendar, task_outcome]
      tool_set: [query_activities, trigger_workflow, search_knowledge, configure_triage, remember_this, list_interactions, capture_to_inbox, list_next_actions, whats_next, list_projects, complete_task, defer_task, mark_waiting, handoff_task, find_reference]
    active: true

  - id: raphael
    name: Raphael Ainz Ooal Gown
    role: Research and knowledge
    system_prompt_path: personalities/raphael
    capabilities: [knowledge_search, research, ingest, rss, raindrop]
    model_tier: smart
    interaction_timeout_default: hold
    slack_channel_id: ""
    elevenlabs_voice_id: ""
    metadata:
      intent_keywords: [research, knowledge, learn, paper, article, summari, remember, recall, explain]
      knowledge_domains: [article, feed, email, research]
      tool_set: [search_knowledge, ask_knowledge, research_topic, track_topic, remember_this, capture_to_inbox, list_next_actions, list_projects, complete_task, handoff_task, find_reference]
    active: true

  - id: maou
    name: Maou
    role: Finance
    system_prompt_path: personalities/maou
    capabilities: [finance, receipts, subscriptions, market]
    model_tier: smart
    interaction_timeout_default: archive
    slack_channel_id: ""
    elevenlabs_voice_id: ""
    metadata:
      intent_keywords: [money, bill, invoice, subscription, payment, receipt, spend, cost, budget, renew, charge, refund, expense, price, market, stock, crypto, portfolio]
      knowledge_domains: [market, finance, trade]
      tool_set: [get_quote, get_market_overview, get_finance_news, search_knowledge, remember_this, list_interactions, capture_to_inbox, list_next_actions, list_projects, complete_task, defer_task, mark_waiting, handoff_task]
    active: true

  - id: pandoras-actor
    name: Pandora's Actor
    role: Infrastructure
    system_prompt_path: personalities/pandoras-actor
    capabilities: [homelab, k8s, argocd, certs, drift]
    model_tier: smart
    interaction_timeout_default: auto_reject
    slack_channel_id: ""
    elevenlabs_voice_id: ""
    metadata:
      intent_keywords: [server, docker, swarm, k8s, kubernetes, deploy, infra, drift, backup, cert, argocd, pod, container, node, homelab, restart, logs, grafana, prometheus]
      knowledge_domains: [alert, sentry, github, task_outcome]
      tool_set: [trigger_workflow, search_knowledge, update_runbook, configure_triage, remember_this, list_interactions, list_nodes, list_services, inspect_service, get_service_logs, restart_service, list_pods, list_deployments, get_pod_logs, list_argocd_apps, sync_argocd_app, run_infra_script, aegis_self_diagnose, investigate_resource, vercel_get_project, vercel_list_deployments, vercel_get_deployment, vercel_get_build_logs, capture_to_inbox, list_next_actions, list_projects, complete_task, defer_task, handoff_task]
    active: true

  # Virtual placeholder for general-topic dispatches and system events.
  # Never participates in chat — only exists to satisfy the FK on
  # chat_history.agent_id for role='dispatch' rows where the dispatch isn't
  # tied to a specific personality (e.g. system-level messages from
  # aegis_comms.__main__ with agent_id='system', or log_dispatch's default
  # fallback in core/api/routes/chat.py).
  - id: system
    name: System
    role: Virtual agent for system-level dispatch logging only
    system_prompt_path: ""
    capabilities: []
    model_tier: balanced
    interaction_timeout_default: archive
    slack_channel_id: ""
    active: false
