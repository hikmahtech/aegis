name: "Worker — Test"

# Public repo: test only. Image build + swarm deploy live in the private
# homelab-gitops infra repo (ansible), not here.

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "core/**"
      - "tests/worker/**"
      - ".github/workflows/worker.yml"
  pull_request:
    branches: [main]
    paths:
      - "worker/**"
      - "core/**"
      - "tests/worker/**"
      - ".github/workflows/worker.yml"

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            core/pyproject.toml
            worker/pyproject.toml

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "core[dev]" -e "worker[dev]"

      - name: Lint
        run: ruff check worker/src/ tests/worker/

      - name: Test
        run: pytest tests/worker/ -v --tb=short --cov=worker/src/aegis_worker --cov-report=term-missing --cov-report=xml
