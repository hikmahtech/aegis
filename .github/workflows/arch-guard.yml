name: arch-guard

# Enforces the capability dependency law (docs/architecture/productization.md §3, §20).
# No-op until the packages/ layout lands; flip AEGIS_BOUNDARY_STRICT=1 here once the
# refactor is complete to prevent regression to the old monolith shape.

on:
  pull_request:
  push:
    branches: [main, rewrite/v3]

jobs:
  boundary-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Capability boundary lint
        run: python scripts/check_capability_boundaries.py .
