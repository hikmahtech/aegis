name: "Comms — Test, Build & Deploy"

on:
  push:
    branches: [main]
    paths:
      - "comms/**"
      - "tests/comms/**"
      - ".github/workflows/comms.yml"
  pull_request:
    branches: [main]
    paths:
      - "comms/**"
      - "tests/comms/**"
      - ".github/workflows/comms.yml"

env:
  DOCKER_HUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/aegis-comms

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            core/pyproject.toml
            comms/pyproject.toml

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "core[dev]" -e "comms[dev]"

      - name: Lint
        run: ruff check comms/src/ tests/comms/

      - name: Test
        run: pytest tests/comms/ -v --tb=short --cov=comms/src/aegis_comms --cov-report=term-missing --cov-report=xml

  build:
    name: Build & Push
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: comms/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=comms
          cache-to: type=gha,mode=max,scope=comms

  deploy:
    name: Deploy to Swarm
    needs: [build]
    runs-on: [self-hosted, swarm, linux, x64]
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    steps:
      - name: Update aegis_comms service
        env:
          IMAGE_TAG: ${{ github.sha }}
          SWARM_MANAGER_HOST: ${{ secrets.SWARM_MANAGER_HOST }}
          SWARM_MANAGER_USER: ${{ secrets.SWARM_MANAGER_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SWARM_SSH_PRIVATE_KEY }}
        run: |
          SHORT_SHA="${IMAGE_TAG:0:7}"
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/swarm_key
          chmod 600 ~/.ssh/swarm_key
          ssh-keyscan -H "$SWARM_MANAGER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "Deploying aegis_comms:${SHORT_SHA}..."
          ssh -i ~/.ssh/swarm_key -o StrictHostKeyChecking=no \
            "${SWARM_MANAGER_USER}@${SWARM_MANAGER_HOST}" \
            "docker pull ${{ vars.DOCKERHUB_USERNAME }}/aegis-comms:${SHORT_SHA} && \
             docker service update --with-registry-auth \
              --image ${{ vars.DOCKERHUB_USERNAME }}/aegis-comms:${SHORT_SHA} \
              --env-add GIT_SHA=${SHORT_SHA} \
              --force aegis_comms"

          rm -f ~/.ssh/swarm_key
