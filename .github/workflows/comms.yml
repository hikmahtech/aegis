name: "Comms — Test"

# Public repo: test only. Image build + swarm deploy live in the private
# homelab-gitops infra repo (ansible), not here.

on:
  push:
    branches: [main]
    paths:
      - "comms/**"
      - "tests/comms/**"
      - ".github/workflows/comms.yml"
  pull_request:
    branches: [main]
    paths:
      - "comms/**"
      - "tests/comms/**"
      - ".github/workflows/comms.yml"

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            core/pyproject.toml
            comms/pyproject.toml

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "core[dev]" -e "comms[dev]"

      - name: Lint
        run: ruff check comms/src/ tests/comms/

      - name: Test
        run: pytest tests/comms/ -v --tb=short --cov=comms/src/aegis_comms --cov-report=term-missing --cov-report=xml
