name: "Core — Test"

# Public repo: test only. Image build + swarm deploy live in the private
# homelab-gitops infra repo (ansible), not here — so forks/clones never build
# or deploy, and no infra/registry details leak into the open-source repo.

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "admin-panel/frontend/src/**"
      - "tests/core/**"
      - "migrations/**"
      - "personalities/**"
      - "pyproject.toml"
      - ".github/workflows/core.yml"
  pull_request:
    branches: [main]
    paths:
      - "core/**"
      - "admin-panel/frontend/src/**"
      - "tests/core/**"
      - "migrations/**"
      - "personalities/**"
      - "pyproject.toml"
      - ".github/workflows/core.yml"

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis_dev
          POSTGRES_DB: aegis
        ports: ["25432:5432"]
        options: >-
          --health-cmd "pg_isready -U aegis" --health-interval 5s
          --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: core/pyproject.toml

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "core[dev]"

      - name: Lint
        run: ruff check core/src/ tests/core/

      - name: Test
        run: pytest tests/core/ -v --tb=short --cov=core/src/aegis --cov-report=term-missing --cov-report=xml
